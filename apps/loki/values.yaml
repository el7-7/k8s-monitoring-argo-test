loki:
  auth_enabled: false

  chunksCache:
  enabled: false

  commonConfig:
    replication_factor: 1

  storage:
    type: filesystem

  schemaConfig:
    configs:
      - from: 2024-01-01
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

deploymentMode: SingleBinary

singleBinary:
  replicas: 1

read:
  replicas: 0

write:
  replicas: 0

backend:
  replicas: 0

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 50Gi

memberlist:
  service:
    publishNotReadyAddresses: true

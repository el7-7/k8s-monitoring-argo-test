apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-monitoring
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/el7-7/k8s-monitoring-argo-test.git
      path: apps/k8s-monitoring
      targetRevision: main
      helm:
        valueFiles:
          - values.yaml
    - repoURL: https://github.com/el7-7/k8s-monitoring-argo-test.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
